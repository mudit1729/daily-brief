{% extends "base.html" %}
{% block title %}Pulse — Voice Coach{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/voice.css') }}">
{% endblock %}

{% block content %}
<div class="vc-layout" id="voiceLayout">
  <!-- Header -->
  <header class="vc-header">
    <div class="vc-header__left">
      <h1 class="vc-header__title">Voice Coach</h1>
      <span class="vc-header__subtitle">C# = Sa &middot; Shuddh Swaras</span>
    </div>
    <div class="vc-header__right">
      <button class="vc-icon-btn" id="vcThemeToggle" onclick="toggleVcTheme()" title="Toggle theme">
        <svg id="vcSunIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="vcMoonIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="vc-icon-btn" id="vcFullscreenBtn" onclick="toggleVcFullscreen()" title="Fullscreen">
        <svg id="vcExpandIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <svg id="vcCollapseIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
    </div>
  </header>

  <!-- Sargam Keyboard -->
  <section class="vc-keyboard">
    <h2 class="vc-section-label">Sargam Keyboard</h2>
    <div class="vc-keys" id="sargamKeys">
      <button class="vc-key" data-swara="Sa"  data-freq="277.18"><span class="vc-key__swara">Sa</span><span class="vc-key__western">C#4</span></button>
      <button class="vc-key" data-swara="Re"  data-freq="311.13"><span class="vc-key__swara">Re</span><span class="vc-key__western">D#4</span></button>
      <button class="vc-key" data-swara="Ga"  data-freq="349.23"><span class="vc-key__swara">Ga</span><span class="vc-key__western">F4</span></button>
      <button class="vc-key" data-swara="Ma"  data-freq="369.99"><span class="vc-key__swara">Ma</span><span class="vc-key__western">F#4</span></button>
      <button class="vc-key" data-swara="Pa"  data-freq="415.30"><span class="vc-key__swara">Pa</span><span class="vc-key__western">G#4</span></button>
      <button class="vc-key" data-swara="Dha" data-freq="466.16"><span class="vc-key__swara">Dha</span><span class="vc-key__western">A#4</span></button>
      <button class="vc-key" data-swara="Ni"  data-freq="523.25"><span class="vc-key__swara">Ni</span><span class="vc-key__western">C5</span></button>
      <button class="vc-key" data-swara="Sa'" data-freq="554.37"><span class="vc-key__swara">Sa'</span><span class="vc-key__western">C#5</span></button>
    </div>
    <p class="vc-hint">Click or press keys 1-8 to play</p>
  </section>

  <!-- Pitch Detector -->
  <section class="vc-detector">
    <h2 class="vc-section-label">Pitch Detector</h2>
    <div class="vc-pitch-display" id="pitchDisplay">
      <!-- Arc gauge -->
      <div class="vc-arc">
        <svg class="vc-arc__svg" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#ef4444"/>
              <stop offset="25%"  stop-color="#f59e0b"/>
              <stop offset="50%"  stop-color="#22c55e"/>
              <stop offset="75%"  stop-color="#f59e0b"/>
              <stop offset="100%" stop-color="#ef4444"/>
            </linearGradient>
            <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feFlood flood-color="#22c55e" flood-opacity="0.6"/>
              <feComposite in2="blur" operator="in"/>
              <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Background arc track -->
          <path d="M 30 160 A 120 120 0 0 1 270 160" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="14" stroke-linecap="round"/>

          <!-- Colored arc -->
          <path d="M 30 160 A 120 120 0 0 1 270 160" fill="none" stroke="url(#arcGrad)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

          <!-- Radial tick marks (computed along arc, r=102→112, center r=98→112) -->
          <g class="vc-arc__ticks" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round">
            <line x1="48"    y1="160"   x2="38"    y2="160"/>
            <line x1="53"    y1="128.5" x2="43.5"  y2="125.4"/>
            <line x1="67.5"  y1="100"   x2="59.4"  y2="94.2"/>
            <line x1="90"    y1="77.5"  x2="84.2"  y2="69.4"/>
            <line x1="118.5" y1="63"    x2="115.4" y2="53.5"/>
            <line x1="150"   y1="62"    x2="150"   y2="48" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
            <line x1="181.5" y1="63"    x2="184.6" y2="53.5"/>
            <line x1="210"   y1="77.5"  x2="215.8" y2="69.4"/>
            <line x1="232.5" y1="100"   x2="240.6" y2="94.2"/>
            <line x1="247"   y1="128.5" x2="256.5" y2="125.4"/>
            <line x1="252"   y1="160"   x2="262"   y2="160"/>
          </g>

          <!-- Labels -->
          <text x="22"  y="175" class="vc-arc__label">-50</text>
          <text x="150" y="32"  class="vc-arc__label" text-anchor="middle">0</text>
          <text x="278" y="175" class="vc-arc__label">+50</text>

          <!-- Needle (no SVG transform attr — animated via CSS transform) -->
          <g id="centsNeedle" class="vc-arc__needle">
            <line x1="150" y1="160" x2="150" y2="52" stroke="var(--sb-accent, #3b82f6)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="150" cy="160" r="6" fill="var(--sb-accent, #3b82f6)"/>
            <circle cx="150" cy="160" r="3" fill="var(--sb-bg-secondary, #1a1a2e)"/>
          </g>
        </svg>
      </div>

      <!-- Detected swara (below arc) -->
      <div class="vc-detected">
        <span class="vc-detected__swara" id="detectedSwara">--</span>
        <span class="vc-detected__freq" id="detectedFreq">-- Hz</span>
        <span class="vc-detected__cents" id="detectedCents"></span>
      </div>

      <!-- Volume meter + mic button row -->
      <div class="vc-bottom-row">
        <div class="vc-volume">
          <span class="vc-volume__label">Vol</span>
          <div class="vc-volume__track">
            <div class="vc-volume__fill" id="volumeFill"></div>
          </div>
        </div>
        <button class="vc-mic-btn" id="micBtn" onclick="toggleMic()">
          <svg id="micOnIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <svg id="micOffIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span id="micLabel">Start Mic</span>
        </button>
      </div>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/voice.js') }}" defer></script>
{% endblock %}

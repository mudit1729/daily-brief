<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Actor-Critic Architecture</title>
  <desc id="desc">A clean actor-critic reinforcement learning loop showing state, actor, action, environment, critic, TD error, and parameter updates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5ef"/>
      <stop offset="100%" stop-color="#eef5f7"/>
    </linearGradient>
    <linearGradient id="actorFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f7a8c"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
    <linearGradient id="criticFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="envFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="signalFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff4d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#314158"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#1f7a8c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#c2410c"/>
    </marker>
    <style>
      .title { font: 700 34px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #16212f; }
      .subtitle { font: 500 18px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #4b5563; }
      .boxTitle { font: 700 28px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #ffffff; }
      .boxBody { font: 500 19px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #eaf4f6; }
      .darkBody { font: 600 19px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #f8fafc; }
      .signalTitle { font: 700 24px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #8a4b00; }
      .signalBody { font: 500 18px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #5b4630; }
      .small { font: 600 17px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #314158; }
      .label { font: 600 18px 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; fill: #314158; }
      .mono { font: 600 20px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #314158; }
    </style>
  </defs>

  <rect width="1400" height="900" rx="32" fill="url(#bg)"/>

  <text x="90" y="90" class="title">Actor-Critic Architecture</text>
  <text x="90" y="126" class="subtitle">The actor chooses actions. The critic scores what just happened and supplies the learning signal.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="210" width="180" height="110" rx="26" fill="#ffffff" stroke="#c7d2da" stroke-width="2"/>
    <text x="180" y="255" text-anchor="middle" class="small">State</text>
    <text x="180" y="293" text-anchor="middle" class="mono">s_t</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="170" width="300" height="170" rx="32" fill="url(#actorFill)"/>
    <text x="510" y="228" text-anchor="middle" class="boxTitle">Actor</text>
    <text x="510" y="266" text-anchor="middle" class="boxBody">policy pi_theta(a|s)</text>
    <text x="510" y="304" text-anchor="middle" class="boxBody">outputs action distribution</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="750" y="210" width="180" height="110" rx="26" fill="#ffffff" stroke="#c7d2da" stroke-width="2"/>
    <text x="840" y="255" text-anchor="middle" class="small">Sample action</text>
    <text x="840" y="293" text-anchor="middle" class="mono">a_t</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1010" y="170" width="300" height="170" rx="32" fill="url(#envFill)"/>
    <text x="1160" y="228" text-anchor="middle" class="boxTitle">Environment</text>
    <text x="1160" y="266" text-anchor="middle" class="darkBody">transition + reward</text>
    <text x="1160" y="304" text-anchor="middle" class="darkBody">returns r_(t+1), s_(t+1)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="500" width="340" height="180" rx="32" fill="url(#criticFill)"/>
    <text x="640" y="560" text-anchor="middle" class="boxTitle">Critic</text>
    <text x="640" y="600" text-anchor="middle" class="boxBody">value estimate V_w(s)</text>
    <text x="640" y="638" text-anchor="middle" class="boxBody">or action-value Q_w(s, a)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="515" width="300" height="150" rx="30" fill="url(#signalFill)" stroke="#f4c97a" stroke-width="2"/>
    <text x="1080" y="568" text-anchor="middle" class="signalTitle">Learning signal</text>
    <text x="1080" y="606" text-anchor="middle" class="signalBody">TD error or advantage</text>
    <text x="1080" y="638" text-anchor="middle" class="signalBody">delta_t = r + gamma V(s') - V(s)</text>
  </g>

  <path d="M 270 265 L 360 255" fill="none" stroke="#314158" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 660 255 L 750 265" fill="none" stroke="#314158" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 930 265 L 1010 255" fill="none" stroke="#314158" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 1160 340 C 1160 430, 1000 450, 875 535" fill="none" stroke="#314158" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 180 320 C 180 470, 320 560, 470 560" fill="none" stroke="#314158" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 1160 340 C 1160 455, 840 430, 720 500" fill="none" stroke="#314158" stroke-width="5" marker-end="url(#arrow)"/>

  <path d="M 930 590 L 810 590" fill="none" stroke="#c2410c" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrowOrange)"/>
  <path d="M 1030 515 C 1000 435, 875 365, 650 330" fill="none" stroke="#1f7a8c" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrowGreen)"/>

  <text x="314" y="236" class="label">state features</text>
  <text x="676" y="236" class="label">sample or argmax</text>
  <text x="949" y="236" class="label">apply action</text>
  <text x="1180" y="460" class="label">reward and next state</text>
  <text x="240" y="500" class="label">critic also sees state</text>
  <text x="845" y="705" class="label">critic update</text>
  <text x="855" y="430" class="label">actor update</text>

  <g opacity="0.92">
    <rect x="88" y="760" width="1224" height="86" rx="24" fill="#ffffff" stroke="#d7dee3" stroke-width="2"/>
    <text x="130" y="811" class="small">Loop:</text>
    <text x="210" y="811" class="label">observe</text>
    <text x="305" y="811" class="mono">s_t</text>
    <text x="372" y="811" class="label">-> actor picks</text>
    <text x="564" y="811" class="mono">a_t</text>
    <text x="630" y="811" class="label">-> environment returns</text>
    <text x="886" y="811" class="mono">r_(t+1), s_(t+1)</text>
    <text x="1080" y="811" class="label">-> critic computes signal -> update both networks</text>
  </g>
</svg>
